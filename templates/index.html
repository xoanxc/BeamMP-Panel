<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeamMP Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-lg border border-gray-700">
    <h1 class="text-3xl font-bold text-blue-400 mb-6 text-center">Panel de Control <span class="text-white">BeamMP</span></h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="bg-green-500 bg-opacity-20 border border-green-500 text-green-400 p-3 rounded mb-4 text-center">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="bg-gray-900 p-5 rounded-lg mb-6 flex justify-between items-center border border-gray-700">
        <div>
            <p class="text-sm text-gray-400 uppercase tracking-wider">Estado</p>
            <p class="text-lg font-semibold text-green-400 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Online
            </p>
        </div>
        <div class="text-right">
            <p class="text-sm text-gray-400 uppercase tracking-wider">Jugadores</p>
            <p class="text-2xl font-bold text-white" id="player-count">-- / --</p>
        </div>
    </div>

    <div class="mb-8 text-center bg-gray-700 py-3 rounded-lg">
        <p class="text-gray-300">Mapa actual: <span class="text-blue-300 font-bold ml-2">{{ current_map }}</span></p>
    </div>

    <section class="mb-6">
        <h2 class="text-yellow-500 font-semibold mb-3 border-b border-gray-600 pb-1">Mapas Oficiales</h2>
        <form method="post" class="flex gap-3">
            <select name="map_normal" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-400">
                {% for name in maps_normal.keys() %}
                    <option value="{{name}}">{{name}}</option>
                {% endfor %}
            </select>
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg transition">Cambiar</button>
        </form>
    </section>

    <section class="mb-6">
        <h2 class="text-yellow-500 font-semibold mb-3 border-b border-gray-600 pb-1">Mapas de Mods</h2>
        <form method="post" class="flex gap-3">
            <select name="map_mod" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-400">
                {% for name in maps_mods.keys() %}
                    <option value="{{name}}">{{name}}</option>
                {% endfor %}
            </select>
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg transition">Cambiar</button>
        </form>
    </section>

    <form method="post" class="mt-8 text-center border-t border-gray-700 pt-6">
        <input type="hidden" name="restart" value="1">
        <button type="submit" class="bg-red-600 hover:bg-red-500 text-white text-sm font-semibold py-2 px-6 rounded-lg transition" onclick="return confirm('¿Estás seguro de que quieres reiniciar el servidor? Esto desconectará a todos los jugadores.');">
            Reiniciar Servidor
        </button>
    </form>
</div>

<script>
    async function updateStatus() {
        try {
            const response = await fetch('/api/status');
            const data = await response.json();
            document.getElementById('player-count').innerText = `${data.players} / ${data.max_players}`;
        } catch (error) {
            document.getElementById('player-count').innerText = "Error";
        }
    }
    // Ejecutar al cargar la página y luego cada 5 segundos
    updateStatus();
    setInterval(updateStatus, 5000);
</script>

</body>
</html>
